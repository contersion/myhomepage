version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-homepage
    restart: unless-stopped
    ports:
      - "${PORT:-3456}:3000"
    environment:
      # 基础配置
      - NODE_ENV=production
      - PORT=3000
      
      # 数据库配置
      # SQLite 路径在 Docker 中必须使用绝对路径，避免 Prisma Client 按 schema.prisma 目录解析导致写入到镜像内部
      # 直接写死绝对路径，防止被 .env 中的相对路径覆盖
      - DATABASE_URL=file:/app/storage/data/app.db
      # Next.js standalone 会读取 HOSTNAME 作为绑定地址，Docker 默认注入的是容器主机名，会导致只绑定到容器内网 IP，
      # 从而使 healthcheck 的 localhost:3000 请求失败。必须显式覆盖为 0.0.0.0
      - HOSTNAME=0.0.0.0
      
      # Session Secrets（生产环境必须修改）
      - VISITOR_SESSION_SECRET=${VISITOR_SESSION_SECRET}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      
      # 初始密码（首次启动后请立即修改）
      - VISITOR_PASSWORD=${VISITOR_PASSWORD:-visitor123}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      
      # 上传配置
      - UPLOAD_DIR=${UPLOAD_DIR:-./storage/uploads}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-5242880}
    volumes:
      # SQLite 数据库持久化
      - ./storage/data:/app/storage/data
      # 上传文件持久化
      - ./storage/uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
